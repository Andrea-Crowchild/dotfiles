"$schema" = 'https://starship.rs/config-schema.json'

format = """
$git_branch\
$git_status\
$directory\
$python$rust$nodejs$lua$golang$java$kotlin$swift\
$cmd_duration\
$time\
$line_break\
$character"""



[time]
disabled = false
format = '[\[$time\]]($style) '
time_format = "%H:%M"
style = "fg:#6272a4"

[cmd_duration]
min_time = 500
format = '[\($duration\)]($style) '
style = "fg:#f1fa8c"

[git_branch]
symbol = " "
format = '[$symbol$branch]($style) '
style = "fg:#bd93f9"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "fg:#ff79c6"

[directory]
read_only = " ¾░īŠ"
style = "fg:#8be9fd"

[character]
success_symbol = "[ŌØ»](fg:#50fa7b)"
