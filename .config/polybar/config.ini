[colors]
background = #282a36
foreground = #f8f8f2
purple     = #bd93f9
pink       = #ff79c6
cyan       = #8be9fd
green      = #50fa7b
yellow     = #f1fa8c
orange     = #ffb86c
red        = #ff5555
comment    = #6272a4

[bar/hexbar]
width = 100%
height = 40
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 2
padding-right = 2
module-margin-left = 1
module-margin-right = 1
font-0 = OpenDyslexicM Nerd Font Mono:size=16;4
modules-left = i3
modules-center = date
modules-right = pulseaudio battery
wm-restack = i3
enable-ipc = true
tray-position = right
tray-padding = 2

[module/i3]
type = internal/i3
label-focused = %index%
label-focused-foreground = ${colors.purple}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.comment}
label-unfocused-padding = 2
label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label =  %date%   %time%
label-foreground = ${colors.cyan}

[module/pulseaudio]
type = internal/pulseaudio
label-volume =  %percentage%%
label-volume-foreground = ${colors.green}
label-muted =  muted
label-muted-foreground = ${colors.comment}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 98
low-at = 10
label-charging =  %percentage%%
label-charging-foreground = ${colors.yellow}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.orange}
label-full =  full
label-full-foreground = ${colors.green}
label-low =  %percentage%%
label-low-foreground = ${colors.red}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.orange}
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3-foreground = ${colors.yellow}
ramp-capacity-4-foreground = ${colors.green}
