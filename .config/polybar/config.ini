[colors]
background = #282a36
foreground = #f8f8f2
purple     = #bd93f9
pink       = #ff79c6
cyan       = #8be9fd
green      = #50fa7b
yellow     = #f1fa8c
orange     = #ffb86c
red        = #ff5555
comment    = #6272a4

[bar/hexbar]
width = 100%
height = 27
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 1
padding-right = 1
font-0 = OpenDyslexicM Nerd Font Mono:size=14;3
modules-left = i3
modules-center = date
modules-right = pulseaudio battery
wm-restack = i3
enable-ipc = true
tray-position = right
tray-padding = 2

[module/i3]
type = internal/i3
label-focused = %index%
label-focused-foreground = ${colors.purple}
label-unfocused = %index%
label-unfocused-foreground = ${colors.comment}
label-urgent = %index%
label-urgent-foreground = ${colors.red}

[module/date]
type = internal/date
interval = 1
date = %a %d %b  %H:%M
label-foreground = ${colors.cyan}

[module/pulseaudio]
type = internal/pulseaudio
label-volume =  %percentage%%
label-volume-foreground = ${colors.green}
label-muted =  muted
label-muted-foreground = ${colors.comment}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
label-charging =  %percentage%%
label-charging-foreground = ${colors.yellow}
label-discharging =  %percentage%%
label-discharging-foreground = ${colors.orange}
label-full =  full
label-full-foreground = ${colors.green}
